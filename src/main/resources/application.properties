spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/ems}
spring.datasource.username=${DATASOURCE_USERNAME:root}
spring.datasource.password=${DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:ChangeThisToALongRandomBase64SecretStringForJWTSigningPurposesOnly123456}
app.jwt.expiration-ms=86400000

server.port=${PORT:8080}

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG